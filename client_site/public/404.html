<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | 401 Thrift</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #f5f0e8;
            --brown: #3a2a1a;
            --rust: #b5451b;
            --tan: #c9a97a;
            --faded: #8a7a6a;
            --tag-yellow: #f0d060;
        }

        body {
            background-color: var(--cream);
            color: var(--brown);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }

        /* Grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
        }

        /* Decorative stitched border */
        body::after {
            content: '';
            position: fixed;
            inset: 16px;
            border: 2px dashed var(--tan);
            pointer-events: none;
            z-index: 5;
            opacity: 0.5;
        }

        /* Price tag */
        .price-tag {
            position: relative;
            background: var(--tag-yellow);
            border: 2px solid var(--brown);
            border-radius: 4px 4px 4px 4px;
            padding: 0.6rem 1.4rem 0.6rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            color: var(--brown);
            margin-bottom: 2.5rem;
            transform: rotate(-2deg);
            display: inline-block;
            animation: tagSwing 3s ease-in-out infinite;
            box-shadow: 2px 2px 0 rgba(58,42,26,0.2);
        }

        .price-tag::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--brown);
            background: var(--cream);
        }

        .price-tag::after {
            content: '';
            position: absolute;
            left: -22px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 2px;
            background: var(--brown);
        }

        @keyframes tagSwing {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(1deg); }
        }

        /* Main 404 number */
        .error-number {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(8rem, 22vw, 16rem);
            line-height: 0.85;
            color: var(--brown);
            letter-spacing: -0.02em;
            position: relative;
            animation: fadeUp 0.7s ease both;
        }

        .error-number span {
            color: var(--rust);
        }

        /* Stamp overlay on the 4 */
        .error-number::after {
            content: 'SOLD';
            position: absolute;
            top: 30%;
            right: -10px;
            font-family: 'DM Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--rust);
            border: 3px solid var(--rust);
            padding: 0.2rem 0.5rem;
            letter-spacing: 0.15em;
            transform: rotate(18deg);
            opacity: 0.85;
            animation: fadeUp 0.9s ease both;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            color: var(--faded);
            margin-top: 1rem;
            margin-bottom: 0.6rem;
            animation: fadeUp 0.8s 0.1s ease both;
        }

        .subtext {
            font-size: 0.95rem;
            color: var(--faded);
            max-width: 360px;
            text-align: center;
            line-height: 1.65;
            animation: fadeUp 0.8s 0.2s ease both;
        }

        /* Divider */
        .divider {
            width: 80px;
            height: 2px;
            background: var(--tan);
            margin: 2rem auto;
            animation: fadeUp 0.8s 0.25s ease both;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s 0.35s ease both;
        }

        .btn {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.75rem 1.8rem;
            border: 2px solid var(--brown);
            cursor: pointer;
            transition: all 0.18s ease;
            display: inline-block;
        }

        .btn-primary {
            background: var(--brown);
            color: var(--cream);
        }

        .btn-primary:hover {
            background: var(--rust);
            border-color: var(--rust);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--brown);
        }

        .btn-secondary:hover {
            background: var(--tan);
            transform: translateY(-2px);
        }

        /* Scattered decorative tags in background */
        .bg-tag {
            position: fixed;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--tan);
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .center {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <!-- Decorative scattered text -->
    <span class="bg-tag" style="top:8%; left:5%; transform:rotate(-15deg)">vintage · sz M</span>
    <span class="bg-tag" style="top:15%; right:8%; transform:rotate(10deg)">$12.00</span>
    <span class="bg-tag" style="bottom:20%; left:7%; transform:rotate(8deg)">thrifted · 1994</span>
    <span class="bg-tag" style="bottom:12%; right:6%; transform:rotate(-12deg)">good cond.</span>
    <span class="bg-tag" style="top:45%; left:3%; transform:rotate(-5deg)">one of a kind</span>
    <span class="bg-tag" style="top:60%; right:4%; transform:rotate(14deg)">no returns</span>

    <div class="center">
        <div class="price-tag">Item #404 &nbsp;·&nbsp; Not in stock</div>

        <div class="error-number">4<span>0</span>4</div>

        <p class="headline">Looks like this one got away.</p>

        <p class="subtext">
            The page you're looking for has been thrifted, resold, or never existed in the first place.
            Happens to the best of us.
        </p>

        <div class="divider"></div>

        <div class="btn-row">
            <a href="/" class="btn btn-primary">Back to Home</a>
            <a href="/shop" class="btn btn-secondary">Browse the Shop</a>
        </div>
    </div>

</body>
</html>
